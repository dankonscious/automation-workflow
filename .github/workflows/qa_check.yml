# -----------------------------------------------------------------------------
# Workflow: QA Validation (reusable)
# Checks:
#   1. Images < 1MB
#   2. Valid web file extensions
#   3. No duplicate filenames
# Outputs: qa_passed, failure_message
# -----------------------------------------------------------------------------
name: QA Check

on:
  workflow_call:
    outputs:
      qa_passed:
        description: "'true' if all checks passed, 'false' otherwise"
        value: ${{ jobs.qa-check.outputs.qa_passed }}
      failure_message:
        description: "Summary of which checks failed"
        value: ${{ jobs.qa-check.outputs.failure_message }}

jobs:

  qa-check:
    name: QA Validation
    runs-on: ubuntu-latest
    outputs:
      qa_passed:       ${{ steps.qa.outputs.qa_passed }}
      failure_message: ${{ steps.qa.outputs.failure_message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run QA checks
        id: qa
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # On the very first push, before is the zero SHA — list all tracked files
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-tree -r --name-only HEAD)
          else
            CHANGED=$(git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER")
          fi

          if [ -z "$CHANGED" ]; then
            echo "No changed files detected — skipping QA"
            echo "qa_passed=true"        >> "$GITHUB_OUTPUT"
            echo "failure_message="      >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files to validate:"
          echo "$CHANGED"
          echo "---"

          QA_PASSED=true
          FAILURES=""

          IMAGE_EXTS="jpg jpeg png gif webp svg ico avif bmp tiff"
          WEB_EXTS="html htm php css js ts json xml txt md scss less htaccess map yaml yml mp4"

          CHANGED_DIRS=$(echo "$CHANGED" | while IFS= read -r f; do dirname "$f"; done | sort -u)

          # ------------------------------------------------------------------
          # Check 1: Every image file must be smaller than 1MB
          # ------------------------------------------------------------------
          CHECK1_FAILED=false
          CHECK1_FILES=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            [ ! -d "$dir" ] && continue
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              ext="${file##*.}"
              ext="${ext,,}"

              is_image=false
              for img_ext in $IMAGE_EXTS; do
                [ "$ext" = "$img_ext" ] && is_image=true && break
              done

              if [ "$is_image" = true ]; then
                size=$(stat -c%s "$file")
                if [ "$size" -ge 1048576 ]; then
                  CHECK1_FAILED=true
                  QA_PASSED=false
                  CHECK1_FILES="${CHECK1_FILES}$(basename "$file"), "
                fi
              fi
            done < <(find "$dir" -type f ! -name '.*')
          done <<< "$CHANGED_DIRS"
          [ "$CHECK1_FAILED" = true ] && FAILURES="${FAILURES}Check 1: Image size exceeded 1MB — ${CHECK1_FILES%, }\n"

          # ------------------------------------------------------------------
          # Check 2: Every web file must have a recognized extension
          # ------------------------------------------------------------------
          CHECK2_FAILED=false
          CHECK2_FILES=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            [ ! -d "$dir" ] && continue
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              base=$(basename "$file")
              [[ "$base" == .* ]] && continue
              [[ "$base" != *.* ]] && continue

              ext="${base##*.}"
              ext="${ext,,}"

              is_valid=false
              for valid_ext in $IMAGE_EXTS $WEB_EXTS; do
                [ "$ext" = "$valid_ext" ] && is_valid=true && break
              done

              if [ "$is_valid" = false ]; then
                CHECK2_FAILED=true
                QA_PASSED=false
                CHECK2_FILES="${CHECK2_FILES}${base}, "
              fi
            done < <(find "$dir" -type f ! -name '.*')
          done <<< "$CHANGED_DIRS"
          [ "$CHECK2_FAILED" = true ] && FAILURES="${FAILURES}Check 2: Unrecognized file extension — ${CHECK2_FILES%, }\n"

          # ------------------------------------------------------------------
          # Check 3: No duplicate filenames within each committed folder
          # ------------------------------------------------------------------
          CHECK3_DETAIL=""

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            [ ! -d "$dir" ] && continue

            DUPES=$(find "$dir" -type f \
              ! -name '.*' \
              | sed 's|.*/||' \
              | sort | uniq -d)

            if [ -n "$DUPES" ]; then
              while IFS= read -r dupe; do
                [ -z "$dupe" ] && continue
                PATHS=$(find "$dir" -type f ! -name '.*' -name "$dupe" | tr '\n' '  ')
                CHECK3_DETAIL="${CHECK3_DETAIL}${dupe}: ${PATHS}\n"
              done <<< "$DUPES"
              QA_PASSED=false
            fi
          done <<< "$CHANGED_DIRS"

          [ -n "$CHECK3_DETAIL" ] && FAILURES="${FAILURES}Check 3: Duplicate filenames found\n${CHECK3_DETAIL}"

          # ------------------------------------------------------------------
          # Emit outputs
          # ------------------------------------------------------------------
          if [ "$QA_PASSED" = "true" ]; then
            echo "✅ All QA checks passed"
            echo "qa_passed=true"   >> "$GITHUB_OUTPUT"
            echo "failure_message=" >> "$GITHUB_OUTPUT"
          else
            echo "❌ QA checks failed:"
            printf "$FAILURES"
            echo "qa_passed=false" >> "$GITHUB_OUTPUT"
            {
              echo 'failure_message<<EOF'
              printf "$FAILURES"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi
