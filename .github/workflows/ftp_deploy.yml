# -----------------------------------------------------------------------------
# Workflow: FTP Deploy (Root + Pages <img> Replacement)
# -----------------------------------------------------------------------------
  name: FTP Deploy

  on:
    workflow_call:
  
  permissions:
    contents: write
  
  jobs:
    deploy:
      runs-on: ubuntu-latest
  
      steps:
        # ---------------------------------------------------------
        # Checkout code
        # ---------------------------------------------------------
        - name: Checkout code
          uses: actions/checkout@v3
          with:
            fetch-depth: 0
        
        # ---------------------------------------------------------
        # Verify required secrets
        # ---------------------------------------------------------
        - name: Verify required secrets
          run: |
            missing=false
        
            if [ -z "${{ secrets.FTP_SERVER }}" ]; then
              echo "❌ FTP_SERVER secret is missing!"
              missing=true
            fi
        
            if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
              echo "❌ FTP_USERNAME secret is missing!"
              missing=true
            fi
        
            if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
              echo "❌ FTP_PASSWORD secret is missing!"
              missing=true
            fi
        
            if [ "$missing" = true ]; then
              echo "One or more required secrets are missing. Exiting..."
              exit 1
            else
              echo "✅ All required secrets are present."
            fi

        # ---------------------------------------------------------
        # Detect root changes
        # ---------------------------------------------------------
        - name: Detect root changes
          id: rootcheck
          run: |
            ROOT_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep -E '^(index\.html|index\.php)$' || true)
  
            if [ -n "$ROOT_CHANGED" ]; then
              echo "root_changed=true" >> $GITHUB_OUTPUT
            else
              echo "root_changed=false" >> $GITHUB_OUTPUT
            fi
  
        # ---------------------------------------------------------
        # Detect changed folders inside /pages
        # ---------------------------------------------------------
        - name: Detect changed folder inside /pages
          id: pagescheck
          run: |
            FOLDERS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^pages/' \
              | cut -d/ -f2 \
              | sort -u)
  
            if [ -z "$FOLDERS" ]; then
              echo "pages_changed=false" >> $GITHUB_OUTPUT
            else
              # Convert newlines to spaces for safe iteration
              echo "pages_changed=true" >> $GITHUB_OUTPUT
              echo "folders=$(echo $FOLDERS | tr '\n' ' ')" >> $GITHUB_OUTPUT
            fi
  
        # ---------------------------------------------------------
        # Replace <img> src in ROOT files
        # ---------------------------------------------------------
        - name: Replace <img> src using Node
          env:
            REPO_NAME: ${{ github.event.repository.name }}
          run: node ./scripts/ftp_deploy/replace-img.js

        # ---------------------------------------------------------
        # Commit changes (if any)
        # ---------------------------------------------------------
        - name: Commit updated files
          run: |
            BRANCH=${{ github.ref_name }}
            REPO_NAME=${{ github.event.repository.name }}
            git config user.name "enc-action[bot]"
            git config user.email "enc-action[bot]@users.noreply.github.com"
  
            git add -A
            git commit -m "♻️ Update img src tag to CDN path https://d3j6ngx7p7lglj.cloudfront.net/{REPO_NAME}" || echo "No changes to commit"

            git pull origin $BRANCH --no-rebase || true
            git push origin HEAD:$BRANCH
            
        # ---------------------------------------------------------
        # Re-checkout latest commit to ensure FTP sees updated files
        # ---------------------------------------------------------
        - name: Re-checkout latest commit
          if: steps.pagescheck.outputs.pages_changed == 'true'
          uses: actions/checkout@v3
          with:
            ref: ${{ github.ref_name }}
            fetch-depth: 0
  
        # ---------------------------------------------------------
        # Deploy Updated Files to FTP
        # ---------------------------------------------------------
        - name: Upload updated files to FTP
          uses: SamKirkland/FTP-Deploy-Action@4.3.0
          with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            local-dir: ./
            server-dir: /
            include: |
              index.html
              index.php
              **/*.css
              **/*.js
            exclude: |
              **/.git/**
              **/.gitignore
              **/node_modules/**
              **/*.jpg
              **/*.jpeg
              **/*.png
              **/*.gif
              **/*.webp
              **/*.svg
              **/*.ico
              **/*.avif
              **/*.mp4
              **/.github/**
              readme.md
              build-tailwind.js
              tailwind.config.js
              package-lock.json
              package.json