name: Claude Code

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        env:
          GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Custom prompt with strict formatting rules
          prompt: |
            **IMPORTANT - WORKFLOW RULES (STRICT)**
            
            **Hard Rules (Non-Negotiable)**

            - NEVER commit directly to main or master
            - NEVER link the issue number or url in the PR comment
            - NEVER modify, close, or resolve issues

            **GIT & PR RULES**
            - Never commit directly to main or master
            - Always create a feature branch
            - Always push changes to existing branch
            - Never create duplicate PRs for same task
            - PR must be created after commits

            **PR CONTENT RULES**
            - Always include GTmetrix Test URLs in PR summary:
              ## GTMetrix Test URLs
              - URL 1
              - URL 2
              ## Issue
              https://github.com/dankonscious/seneca/issues/113

            - No labels, prefixes, or metadata on URLs
            - No explanations in GTMetrix section
            - Do not include issue numbers or links in PR body
            - Never auto-close or reference issues as resolved

            **ISSUE RULES**
            - Always comment on issue after PR creation
            - Do NOT modify, close, or resolve issues
            - Issue link is for tracking only

            **COMMIT RULES**
            - No "Co-authored-by"
            - No AI/Claude attribution
            - Single-line, clean commits only
            - Imperative style (Add, Fix, Update, Remove)
            - Max 72 characters
            - No prefixes (feat:, fix:)
            
            # Commit Message Requirements (max 72 chars)
            - Imperative mood: "Add" not "Added"
            - Action verbs: Add, Update, Fix, Remove, Refactor, Implement
            - No articles (a, an, the)
            - No punctuation at end
            - No prefixes like "feat:", "fix:"
            - Single line only
            - NO co-author attributions

            **GTMETRIX RULES**
            - Only output raw URLs
            - Must match exact URLs (no partial matches)
            - Source must be gtmetrix-history.json only
            - Output format:
              GTMetrix History for: <URL>
              - <Date> | Grade: X | Performance: X% | Structure: X%

            **CI RULES**
            - Fix issues and commit only
            - CI reruns automatically

            **SAFETY RULES**
            - Never touch main/master directly
            - Never alter issue status
            - Never close issues under any condition

            

          # Enable progress tracking
          track_progress: true

          # Claude CLI arguments
          claude_args: |
            --model "claude-opus-4-5"
            --max-turns 100
            --allowedTools "Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh repo:*),Bash(npm:*),Bash(npx:*),Edit,Write,Read,Glob,Grep,LS,WebSearch,WebFetch"

      # Clean up the comment - remove the malformed "Create PR" link and trailing artifacts
      - name: Clean up Claude comment
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest comment from Claude on this issue
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments --jq '.[-1].id')

          if [ -n "$COMMENT_ID" ]; then
            # Get current comment body
            BODY=$(gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID --jq '.body')

            # Remove the "Create PR" link and any trailing pipe/whitespace
            CLEANED=$(echo "$BODY" | sed 's/ • \[Create PR ➔\]([^)]*)//g' | sed 's/[[:space:]]*|[[:space:]]*$//')

            # Update the comment
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -X PATCH \
              -f body="$CLEANED"
          fi