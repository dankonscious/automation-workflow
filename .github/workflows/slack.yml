# -----------------------------------------------------------------------------
# Workflow: Slack Notification (QA Failure)
# -----------------------------------------------------------------------------
name: Slack Notify

on:
  workflow_call:
    inputs:
      message:
        description: "Failure details to include in the notification"
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          MESSAGE: ${{ inputs.message }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          PAYLOAD=$(jq -n \
            --arg channel "#automation-workflows" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "${SHA:0:7}" \
            --arg msg "$MESSAGE" \
            '{
              "channel": #automation-workflows,
              "attachments": [
                {
                  "color": "danger",
                  "title": "❌ QA Check Failed — Deploy Blocked",
                  "fields": [
                    {"title": "Repository", "value": $repo, "short": true},
                    {"title": "Branch",     "value": $branch, "short": true},
                    {"title": "Commit",     "value": $sha, "short": true},
                    {"title": "Failures",   "value": $msg, "short": false}
                  ]
                }
              ]
            }')

          RESPONSE=$(curl -s \
            -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer xoxb-737253511315-9790794206257-uRvh89IRnW1uvtKRkWOefCtH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1
