# -----------------------------------------------------------------------------
# Workflow: Slack Notification (QA Failure)
# -----------------------------------------------------------------------------
name: Slack Notify

on:
  workflow_call:
    inputs:
      message:
        description: "Failure details to include in the notification"
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
          MESSAGE: ${{ inputs.message }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "${SHA:0:7}" \
            --arg msg "$MESSAGE" \
            '{
              "attachments": [
                {
                  "color": "danger",
                  "title": "❌ QA Check Failed — Deploy Blocked",
                  "fields": [
                    {"title": "Repository", "value": $repo, "short": true},
                    {"title": "Branch",     "value": $branch, "short": true},
                    {"title": "Commit",     "value": $sha, "short": true},
                    {"title": "Failures",   "value": $msg, "short": false}
                  ]
                }
              ]
            }')

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Slack response: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
