# -----------------------------------------------------------------------------
# Workflow: Slack Notification (QA Failure)
# -----------------------------------------------------------------------------
name: Slack Notify

on:
  workflow_call:
    inputs:
      message:
        description: "Failure details to include in the notification"
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          MESSAGE: ${{ inputs.message }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SECRET: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg channel "#automation-workflows" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "${SHA:0:7}" \
            --arg msg "$MESSAGE" \
            '{
                channel: $channel,
                text:
                  ("❌ *QA Check Failed — Deploy Blocked*\n\n" +
                  "*Repository:* " + $repo + "\n" +
                  "*Branch:* " + $branch + "\n" +
                  "*Commit:* " + $sha + "\n\n" +
                  "*Failures:*\n" + $msg)
            }')

          echo "$PAYLOAD"

          RESPONSE=$(curl -s \
            -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || exit 1


 